spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:SeuShimaSushi}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD}
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
    validate-on-migrate: false
    locations: classpath:db/migration
    placeholders:
      admin_name: ${ADMIN_NAME:Seu Shima Sushi Admin}
      admin_email: ${ADMIN_EMAIL:admin@seushimasushi.com}
      admin_password: ${ADMIN_PASSWORD:Admin@123}
      admin_clerk_id: ${ADMIN_CLERK_ID:placeholder-clerk-id}

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: https://informed-haddock-50.clerk.accounts.dev

app:
  security:
    jwt:
      secret: ${JWT_SECRET}

logging:
  level:
    org.springframework.security: INFO