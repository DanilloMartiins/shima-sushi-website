spring:
  application:
    name: seu-shima-sushi-backend
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  flyway:
    placeholders:
      admin_name: ${ADMIN_NAME:Admin}
      admin_email: ${ADMIN_EMAIL:admin@seushimasushi.com}
      admin_password: ${ADMIN_PASSWORD:Admin@123}
      admin_clerk_id: ${ADMIN_CLERK_ID:placeholder-clerk-id}
  mvc:
    throw-exception-if-no-handler-found: true
  web:
    resources:
      add-mappings: false
  jackson:
    time-zone: America/Fortaleza

server:
  servlet:
    context-path: /
  error:
    include-message: always

app:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:4200,http://localhost:4300,http://localhost:5173}
  security:
    jwt:
      secret: ${JWT_SECRET}
      access-token-expiration: ${JWT_ACCESS_EXPIRATION:PT15M}
      refresh-token-expiration: ${JWT_REFRESH_EXPIRATION:P7D}
  image-upload:
    base-directory: ${IMAGE_UPLOAD_BASE_DIR:uploads/products}
    max-file-size: ${IMAGE_UPLOAD_MAX_SIZE:5242880}
    allowed-extensions: jpg,jpeg,png
  clerk:
    secret-key: ${CLERK_SECRET_KEY:}
