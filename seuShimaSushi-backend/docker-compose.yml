version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: seushimasushi-db
    environment:
      POSTGRES_DB: ${DB_NAME:-seushimasushi}
      POSTGRES_USER: ${DB_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app-network

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: seushimasushi-backend
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-prod}
      SERVER_PORT: ${SERVER_PORT:-8080}
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-seushimasushi}
      DB_USERNAME: ${DB_USERNAME:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      JWT_SECRET: ${JWT_SECRET}
      JWT_ACCESS_EXPIRATION: ${JWT_ACCESS_EXPIRATION:-PT15M}
      JWT_REFRESH_EXPIRATION: ${JWT_REFRESH_EXPIRATION:-P7D}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:4200}
      IMAGE_UPLOAD_BASE_DIR: ${IMAGE_UPLOAD_BASE_DIR:-/app/uploads/products}
      ADMIN_NAME: ${ADMIN_NAME:-Seu Shima Sushi Admin}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@seushimasushi.com}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
    ports:
      - "${SERVER_PORT:-8080}:${SERVER_PORT:-8080}"
    volumes:
      - uploads:/app/uploads
      - logs:/app/logs
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:${SERVER_PORT:-8080}/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s
    networks:
      - app-network

volumes:
  db_data:
  uploads:
  logs:

networks:
  app-network:
    driver: bridge