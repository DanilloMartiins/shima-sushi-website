spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:seushimasushi}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
    locations: classpath:db/migration
    placeholders:
      admin_name: ${ADMIN_NAME:Seu Shima Sushi Admin}
      admin_email: ${ADMIN_EMAIL:admin@seushimasushi.com}
      admin_password: ${ADMIN_PASSWORD:Admin@123}

logging:
  level:
    org.springframework.security: INFO