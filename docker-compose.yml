services:
  postgres:
    image: postgres:16-alpine
    container_name: seushimasushi-db
    environment:
      POSTGRES_DB: ${DB_NAME:-seushimasushi}
      POSTGRES_USER: ${DB_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-postgres} -d ${DB_NAME:-seushimasushi}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./seuShimaSushi-backend
      dockerfile: Dockerfile
    container_name: seushimasushi-backend
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-prod}
      SERVER_PORT: 8080
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-seushimasushi}
      DB_USERNAME: ${DB_USERNAME:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      JWT_SECRET: ${JWT_SECRET:-change-me-in-prod}
      JWT_ACCESS_EXPIRATION: ${JWT_ACCESS_EXPIRATION:-PT15M}
      JWT_REFRESH_EXPIRATION: ${JWT_REFRESH_EXPIRATION:-P7D}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:4200,http://localhost:8088}
      IMAGE_UPLOAD_BASE_DIR: ${IMAGE_UPLOAD_BASE_DIR:-/app/uploads/products}
      ADMIN_NAME: ${ADMIN_NAME:-Seu Shima Sushi Admin}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@seushimasushi.com}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-Admin@123}
      ADMIN_CLERK_ID: ${ADMIN_CLERK_ID:-user_3De3NSZ1E0OVrz83mzJH6R9Z64q}
    ports:
      - "8080:8080"
    volumes:
      - uploads:/app/uploads

  frontend:
    build:
      context: ./frontend-angular
      dockerfile: Dockerfile
    container_name: seushimasushi-frontend
    depends_on:
      backend:
        condition: service_started
    environment:
      FRONTEND_API_BASE_URL: ${FRONTEND_API_BASE_URL:-/api/v1}
      FRONTEND_USE_MOCK_PUBLIC_DATA: ${FRONTEND_USE_MOCK_PUBLIC_DATA:-false}
    ports:
      - "8088:80"

volumes:
  db_data:
  uploads:
