databases:
  - name: seushimasushi-db-test
    databaseName: seushimasushi
    user: postgres
    plan: free

services:
  # 1. Backend (Spring Boot)
  - type: web
    name: seushimasushi-backend-test
    env: docker
    dockerContext: ./seuShimaSushi-backend
    dockerfile: Dockerfile
    plan: free
    region: oregon
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      - key: DB_HOST
        fromDatabase:
          name: seushimasushi-db-test
          property: host
      - key: DB_PORT
        fromDatabase:
          name: seushimasushi-db-test
          property: port
      - key: DB_NAME
        fromDatabase:
          name: seushimasushi-db-test
          property: database
      - key: DB_USERNAME
        fromDatabase:
          name: seushimasushi-db-test
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: seushimasushi-db-test
          property: password
      - key: CORS_ALLOWED_ORIGINS
        fromService:
          type: web
          name: seushimasushi-frontend-test
          property: host
      - key: JWT_SECRET
        generateValue: true
      - key: CLERK_SECRET_KEY
        value: sk_test_36QwcRvWsFOZHNXYIGV7Kh81BlOXP0VJtEWBX1pM79
      - key: CLERK_PUBLISHABLE_KEY
        value: pk_test_aW5mb3JtZWQtaGFkZG9jay01MC5jbGVyay5hY2NvdW50cy5kZXYk

  # 2. Frontend (Angular)
  - type: web
    name: seushimasushi-frontend-test
    env: docker
    dockerContext: ./frontend-angular
    dockerfile: Dockerfile
    plan: free
    region: oregon
    envVars:
      - key: FRONTEND_API_BASE_URL
        value: /api/v1
      - key: BACKEND_URL
        fromService:
          type: web
          name: seushimasushi-backend-test
          property: host
