services:
  # 1. Banco de Dados PostgreSQL
  - type: database
    name: seushimasushi-db-test
    databaseName: seushimasushi
    user: postgres
    plan: free # Render Free Tier

  # 2. Backend (Spring Boot)
  - type: web
    name: seushimasushi-backend-test
    env: docker
    dockerContext: ./seuShimaSushi-backend
    dockerfile: Dockerfile
    plan: free
    region: oregon # Recomendado para o plano free
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      - key: DB_HOST
        fromDatabase:
          name: seushimasushi-db-test
          property: host
      - key: DB_PORT
        fromDatabase:
          name: seushimasushi-db-test
          property: port
      - key: DB_NAME
        fromDatabase:
          name: seushimasushi-db-test
          property: database
      - key: DB_USERNAME
        fromDatabase:
          name: seushimasushi-db-test
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: seushimasushi-db-test
          property: password
      - key: CORS_ALLOWED_ORIGINS
        fromService:
          type: web
          name: seushimasushi-frontend-test
          property: host
      # Segredos que você deve preencher no painel do Render após o deploy inicial:
      - key: JWT_SECRET
        generateValue: true
      - key: CLERK_SECRET_KEY
        sync: false
      - key: CLERK_PUBLISHABLE_KEY
        sync: false

  # 3. Frontend (Angular)
  - type: web
    name: seushimasushi-frontend-test
    env: docker
    dockerContext: ./frontend-angular
    dockerfile: Dockerfile
    plan: free
    region: oregon
    envVars:
      - key: FRONTEND_API_BASE_URL
        value: /api/v1
      # A URL do backend para o Proxy do Nginx ou chamadas diretas
      - key: BACKEND_URL
        fromService:
          type: web
          name: seushimasushi-backend-test
          property: host
