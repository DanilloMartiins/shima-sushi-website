name: Ping Backend (Keep Alive)

on:
  schedule:
    # Pinga a cada 10 minutos, todos os dias - Render free dorme com 15min de inatividade
    - cron: '*/10 * * * *'
  workflow_dispatch: # Permite rodar manualmente

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping no health check
        run: |
          curl -s -o /dev/null -w "Status: %{http_code}\n" \
            https://seu-shima-backend.onrender.com/health
